<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    ta.style.pointerEvents = 'none';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>
<script src="../nav.js"></script>
<script>
initToolsNav('checklist/');

var themeToggle = document.getElementById('themeToggle');
var html = document.documentElement;
var saved = localStorage.getItem('theme');
if (saved) html.setAttribute('data-theme', saved);
if (!saved && window.matchMedia('(prefers-color-scheme: light)').matches) {
    html.setAttribute('data-theme', 'light');
}
updateIcon();
themeToggle.addEventListener('click', function() {
    var current = html.getAttribute('data-theme');
    var next = current === 'light' ? '' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateIcon();
});
function updateIcon() {
    var isLight = html.getAttribute('data-theme') === 'light';
    themeToggle.innerHTML = isLight
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
}

var header = document.getElementById('header');
window.addEventListener('scroll', function() {
    header.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

// Tool-specific JS
var TEMPLATES = [
    {
        id: 'launch',
        name: 'Запуск сайта',
        items: [
            'Домен подключён',
            'Хостинг активирован',
            'SSL-сертификат установлен',
            'База данных создана',
            'CMS установлена',
            'Все страницы созданы',
            'Мета-теги заполнены',
            'Sitemap.xml создан',
            'robots.txt настроен',
            'Аналитика подключена',
            'Формы работают',
            'Мобильная версия проверена',
            'Скорость проверена',
            '404 страница настроена',
            'Резервное копирование настроено'
        ]
    },
    {
        id: 'seo',
        name: 'SEO-аудит',
        items: [
            'robots.txt',
            'sitemap.xml',
            'Заголовки H1-H3',
            'meta-descriptions',
            'Alt-теги изображений',
            'Скорость загрузки',
            'Мобильная версия',
            'Битые ссылки',
            'Структура URL',
            'SSL/HTTPS',
            'Канонические URL',
            'Schema.org разметка'
        ]
    },
    {
        id: 'dev',
        name: 'Разработка',
        items: [
            'Git репозиторий',
            'Ветка разработки',
            'CI/CD',
            'Unit-тесты',
            'Code review',
            'Безопасность',
            'Документация',
            'Кросс-браузерность',
            'Деплой на staging',
            'Approval заказчика'
        ]
    },
    {
        id: 'design',
        name: 'Дизайн',
        items: [
            'Референсы',
            'Структура страниц',
            'Прототип',
            'Утверждение прототипа',
            'Визуальный дизайн',
            'UI-kit',
            'Типографика',
            'Цветовая палитра',
            'Мокапы экранов',
            'Адаптивный дизайн',
            'Передача в разработку'
        ]
    }
];

var STORAGE_KEY = 'axiiom_checklist_state';
var activeTemplateId = null;

function getState() {
    try {
        return JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || {};
    } catch (e) {
        return {};
    }
}

function saveState(state) {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getChecked(templateId) {
    var state = getState();
    return state[templateId] || [];
}

function setChecked(templateId, indices) {
    var state = getState();
    state[templateId] = indices;
    saveState(state);
}

function initTabs() {
    var container = document.getElementById('templateTabs');
    container.innerHTML = '';
    for (var i = 0; i < TEMPLATES.length; i++) {
        var t = TEMPLATES[i];
        var btn = document.createElement('button');
        btn.className = 'template-btn' + (i === 0 ? ' tool-btn active' : ' tool-btn-secondary');
        btn.textContent = t.name;
        btn.dataset.templateId = t.id;
        btn.addEventListener('click', function() {
            switchTemplate(this.dataset.templateId);
        });
        container.appendChild(btn);
    }
}

function switchTemplate(templateId) {
    activeTemplateId = templateId;
    var btns = document.querySelectorAll('.template-btn');
    for (var i = 0; i < btns.length; i++) {
        var btn = btns[i];
        var isActive = btn.dataset.templateId === templateId;
        btn.className = 'template-btn' + (isActive ? ' tool-btn active' : ' tool-btn-secondary');
    }
    renderChecklist(templateId);
}

function renderChecklist(templateId) {
    var template = null;
    for (var i = 0; i < TEMPLATES.length; i++) {
        if (TEMPLATES[i].id === templateId) {
            template = TEMPLATES[i];
            break;
        }
    }
    if (!template) return;

    var container = document.getElementById('checklistContainer');
    var checked = getChecked(templateId);
    container.innerHTML = '';

    for (var j = 0; j < template.items.length; j++) {
        var item = template.items[j];
        var label = document.createElement('label');
        label.className = 'checkbox-label' + (checked.indexOf(j) !== -1 ? ' checked' : '');

        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked.indexOf(j) !== -1;
        cb.dataset.index = j;

        cb.addEventListener('change', function() {
            var idx = parseInt(this.dataset.index);
            onCheckChange(templateId, idx, this.checked);
        });

        label.appendChild(cb);
        label.appendChild(document.createTextNode(' ' + item));
        container.appendChild(label);
    }

    updateProgress(templateId);
}

function onCheckChange(templateId, index, checked) {
    var current = getChecked(templateId);
    var idx = current.indexOf(index);

    if (checked && idx === -1) {
        current.push(index);
        current.sort(function(a, b) { return a - b; });
    } else if (!checked && idx !== -1) {
        current.splice(idx, 1);
    }

    setChecked(templateId, current);
    renderChecklist(templateId);
}

function updateProgress(templateId) {
    var template = null;
    for (var i = 0; i < TEMPLATES.length; i++) {
        if (TEMPLATES[i].id === templateId) {
            template = TEMPLATES[i];
            break;
        }
    }
    if (!template) return;

    var checked = getChecked(templateId);
    var total = template.items.length;
    var done = checked.length;
    var pct = total > 0 ? (done / total) * 100 : 0;

    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' из ' + total + ' выполнено';
}

function resetChecked() {
    if (!activeTemplateId) return;
    var template = null;
    for (var i = 0; i < TEMPLATES.length; i++) {
        if (TEMPLATES[i].id === activeTemplateId) {
            template = TEMPLATES[i];
            break;
        }
    }
    if (!template || template.items.length === 0) return;
    if (!confirm('Сбросить все отметки в шаблоне "' + template.name + '"?')) return;

    setChecked(activeTemplateId, []);
    renderChecklist(activeTemplateId);
}

(function init() {
    initTabs();
    switchTemplate(TEMPLATES[0].id);
    document.getElementById('resetBtn').addEventListener('click', resetChecked);
})();
</script>
</body>
