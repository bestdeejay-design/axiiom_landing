<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер валют — AXIIOM Tools</title>
    <link rel="icon" type="image/svg+xml" href="/images/axiiom3230-3932-4834-b432-373532376430__fav.svg">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="noise"></div>
<div class="grid-overlay"></div>

<header class="header" id="header">
    <div class="container">
        <nav class="nav">
            <a href="/" class="logo">
                <svg width="30" height="30" viewBox="0 0 36 36" fill="none">
                    <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
                    <rect x="20" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
                    <rect x="2" y="20" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
                    <rect x="20" y="20" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="27" cy="27" r="3" fill="currentColor" opacity=".8"/>
                </svg>
                <span>AXIIOM</span>
            </a>
            <ul class="nav-links nav-links--desktop tools-nav-links" id="toolsNav"></ul>
            <div class="nav-actions">
                <button class="theme-btn" id="themeToggle" aria-label="Сменить тему">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
                <button class="nav-toggle tools-nav-toggle" id="navToggle" aria-label="Меню">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </div>
</header>

<div class="nav-overlay" id="navOverlay">
    <ul class="nav-links" id="toolsNavMobile"></ul>
</div>

<div class="tools-pills" id="toolsPills"></div>

<section class="tool-page">
    <div class="container">
        <div class="tool-page-header">
            <a href="../" class="back-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg> Все инструменты</a>
            <h1>Конвертер валют</h1>
        </div>
        <p class="tool-description">Пересчёт сумм между основными валютами.</p>
        <div class="tool-page-card">
            <div class="tool-row">
                <label class="tool-label" for="amount">Сумма</label>
                <input class="tool-input" type="number" id="amount" value="1" min="0" step="any">
            </div>
            <div class="tool-grid-2">
                <div class="tool-row">
                    <label class="tool-label" for="fromCurrency">Из</label>
                    <select class="tool-select" id="fromCurrency">
                        <option value="RUB">RUB — Российский рубль</option>
                        <option value="USD" selected>USD — Доллар США</option>
                        <option value="EUR">EUR — Евро</option>
                        <option value="CNY">CNY — Китайский юань</option>
                        <option value="GBP">GBP — Британский фунт</option>
                        <option value="JPY">JPY — Японская иена</option>
                        <option value="KZT">KZT — Казахстанский тенге</option>
                        <option value="BYN">BYN — Белорусский рубль</option>
                        <option value="AMD">AMD — Армянский драм</option>
                        <option value="UZS">UZS — Узбекский сум</option>
                        <option value="TRY">TRY — Турецкая лира</option>
                        <option value="AED">AED — Дирхам ОАЭ</option>
                        <option value="THB">THB — Тайский бат</option>
                    </select>
                </div>
                <div class="tool-row">
                    <label class="tool-label" for="toCurrency">В</label>
                    <select class="tool-select" id="toCurrency">
                        <option value="RUB" selected>RUB — Российский рубль</option>
                        <option value="USD">USD — Доллар США</option>
                        <option value="EUR">EUR — Евро</option>
                        <option value="CNY">CNY — Китайский юань</option>
                        <option value="GBP">GBP — Британский фунт</option>
                        <option value="JPY">JPY — Японская иена</option>
                        <option value="KZT">KZT — Казахстанский тенге</option>
                        <option value="BYN">BYN — Белорусский рубль</option>
                        <option value="AMD">AMD — Армянский драм</option>
                        <option value="UZS">UZS — Узбекский сум</option>
                        <option value="TRY">TRY — Турецкая лира</option>
                        <option value="AED">AED — Дирхам ОАЭ</option>
                        <option value="THB">THB — Тайский бат</option>
                    </select>
                </div>
            </div>
            <div class="tool-btn-group">
                <button class="tool-btn" id="convertBtn">Конвертировать</button>
            </div>
            <div class="tool-output" id="resultOutput">
                <div class="tool-output-label">Результат</div>
                <span id="resultText">1 USD = 90,0000 RUB</span>
            </div>
            <p style="font-size:0.75rem;color:var(--clr-faint);margin-top:12px;letter-spacing:0.3px;">Курсы указаны приблизительно</p>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <div id="footerTools"></div>
        <p class="copy"><a href="https://axiiom.ru/" class="footer-link">AXIIOM</a> © 2026 — Бесплатные онлайн-инструменты</p>
    </div>
</footer>

<script src="../nav.js"></script>
<script>
initToolsNav('currency/');

var themeToggle = document.getElementById('themeToggle');
var html = document.documentElement;
var saved = localStorage.getItem('theme');
if (saved) html.setAttribute('data-theme', saved);
if (!saved && window.matchMedia('(prefers-color-scheme: light)').matches) {
    html.setAttribute('data-theme', 'light');
}
updateIcon();
themeToggle.addEventListener('click', function() {
    var current = html.getAttribute('data-theme');
    var next = current === 'light' ? '' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateIcon();
});
function updateIcon() {
    var isLight = html.getAttribute('data-theme') === 'light';
    themeToggle.innerHTML = isLight
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
}

var header = document.getElementById('header');
window.addEventListener('scroll', function() {
    header.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

// --- Currency Converter Logic ---
var rates = {
    RUB: 1,
    USD: 90,
    EUR: 98,
    CNY: 12.5,
    GBP: 114,
    JPY: 0.6,
    KZT: 0.19,
    BYN: 28,
    AMD: 0.23,
    UZS: 0.007,
    TRY: 2.8,
    AED: 24.5,
    THB: 2.5
};

var amountInput = document.getElementById('amount');
var fromSelect = document.getElementById('fromCurrency');
var toSelect = document.getElementById('toCurrency');
var convertBtn = document.getElementById('convertBtn');
var resultText = document.getElementById('resultText');

function formatNum(n) {
    if (Math.abs(n) < 0.0001 && n !== 0) return n.toExponential(4);
    if (n >= 1) {
        var s = n.toFixed(4).replace(/\.?0+$/, '');
        return parseFloat(s).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 4 });
    }
    return n.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 6 });
}

function convert() {
    var amount = parseFloat(amountInput.value) || 0;
    var from = fromSelect.value;
    var to = toSelect.value;
    var rubAmount = amount * rates[from];
    var result = rubAmount / rates[to];
    if (amount === 0) {
        resultText.textContent = '0';
    } else if (from === to) {
        resultText.textContent = formatNum(result) + ' ' + to;
    } else {
        resultText.innerHTML = formatNum(amount) + ' ' + from + ' = ' + formatNum(result) + ' ' + to;
    }
}

convertBtn.addEventListener('click', convert);
amountInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') convert(); });
fromSelect.addEventListener('change', convert);
toSelect.addEventListener('change', convert);

convert();
</script>
</body>
</html>
