<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var tip = btn.querySelector('.share-tooltip');
    if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function() {
            if (tip) tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000);
        }).catch(function() { copyFallback(url, tip); });
    } else {
        copyFallback(url, tip);
    }
}
function copyFallback(url, tip) {
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'absolute';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (tip) tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000);
}
</script>
<script src="../nav.js"></script>
<script>
initToolsNav('lorem-ipsum/');

var themeToggle = document.getElementById('themeToggle');
var html = document.documentElement;
var saved = localStorage.getItem('theme');
if (saved) html.setAttribute('data-theme', saved);
if (!saved && window.matchMedia('(prefers-color-scheme: light)').matches) {
    html.setAttribute('data-theme', 'light');
}
updateIcon();
themeToggle.addEventListener('click', function() {
    var current = html.getAttribute('data-theme');
    var next = current === 'light' ? '' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateIcon();
});
function updateIcon() {
    var isLight = html.getAttribute('data-theme') === 'light';
    themeToggle.innerHTML = isLight
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
}

var header = document.getElementById('header');
window.addEventListener('scroll', function() {
    header.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

var WORDS = [
    'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
    'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
    'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
    'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo',
    'consequat', 'duis', 'aute', 'irure', 'dolor', 'in', 'reprehenderit', 'voluptate',
    'velit', 'esse', 'cillum', 'eu', 'fugiat', 'nulla', 'pariatur', 'excepteur',
    'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui',
    'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum',
    'a', 'ab', 'accusamus', 'accusantium', 'aliquid', 'aperiam', 'architecto',
    'atque', 'aut', 'beatae', 'cum', 'dicta', 'dignissimos', 'distinctio',
    'earum', 'eligendi', 'eos', 'error', 'expedita', 'facere', 'fuga',
    'harum', 'hic', 'illo', 'illum', 'impedit', 'inventore', 'ipsa',
    'iste', 'iure', 'iusto', 'laboriosam', 'libero', 'maiores', 'maxime',
    'minima', 'minus', 'modi', 'molestiae', 'molestias', 'nam', 'natus',
    'necessitatibus', 'neque', 'nobis', 'numquam', 'omnis', 'optio', 'placeat',
    'porro', 'possimus', 'praesentium', 'quae', 'quaerat', 'quas', 'quasi',
    'quia', 'quibusdam', 'quidem', 'quo', 'quod', 'ratione', 'recusandae',
    'rem', 'rerum', 'saepe', 'sapiente', 'similique', 'soluta', 'tempore',
    'temporibus', 'totam', 'tristique', 'tincidunt', 'ultricies', 'viverra',
    'turpis', 'voluptas', 'voluptatem', 'voluptatibus'
];

var typeSelect = document.getElementById('typeSelect');
var countInput = document.getElementById('countInput');
var generateBtn = document.getElementById('generateBtn');
var output = document.getElementById('output');
var copyBtn = document.getElementById('copyBtn');

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pickWord() {
    return WORDS[Math.floor(Math.random() * WORDS.length)];
}

function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

function generateWords(count) {
    var result = [];
    for (var i = 0; i < count; i++) {
        result.push(pickWord());
    }
    return result.join(' ');
}

function generateSentence() {
    var len = rand(5, 12);
    var words = [];
    for (var i = 0; i < len; i++) {
        words.push(pickWord());
    }
    return capitalize(words.join(' ')) + '.';
}

function generateSentences(count) {
    var result = [];
    for (var i = 0; i < count; i++) {
        result.push(generateSentence());
    }
    return result.join(' ');
}

function generateParagraph() {
    var len = rand(3, 7);
    var sentences = [];
    for (var i = 0; i < len; i++) {
        sentences.push(generateSentence());
    }
    return sentences.join(' ');
}

function generateParagraphs(count) {
    var result = [];
    for (var i = 0; i < count; i++) {
        result.push(generateParagraph());
    }
    return result.join('\n\n');
}

generateBtn.addEventListener('click', function() {
    var type = typeSelect.value;
    var count = parseInt(countInput.value, 10);
    if (isNaN(count) || count < 1) count = 1;
    if (count > 100) count = 100;

    var text = '';
    switch (type) {
        case 'words':
            text = generateWords(count);
            break;
        case 'sentences':
            text = generateSentences(count);
            break;
        case 'paragraphs':
            text = generateParagraphs(count);
            break;
    }
    output.textContent = text;
    output.style.color = '';
});

copyBtn.addEventListener('click', function() {
    var text = output.textContent;
    if (!text || text === 'Нажмите «Сгенерировать», чтобы создать текст…') return;
    navigator.clipboard.writeText(text).then(function() {
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.classList.remove('copied'); }, 2000);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.classList.remove('copied'); }, 2000);
    });
});
</script>
