<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum — AXIIOM</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3e;
    --text: #e4e4f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-hover: #7f70f5;
    --radius: 8px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }

  header svg { flex-shrink: 0; }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  header span { color: var(--text-dim); font-size: 13px; }

  .container {
    flex: 1;
    max-width: 880px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .tool-header { margin-bottom: 36px; }

  .tool-header h2 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .tool-header p { color: var(--text-dim); font-size: 15px; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 32px;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }

  .field select,
  .field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
    min-width: 160px;
  }

  .field select:focus,
  .field input:focus { border-color: var(--accent); }

  .field input[type="number"] { min-width: 100px; width: 100px; }

  .field input[type="number"]::-webkit-inner-spin-button { opacity: 1; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--border); }

  .output-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }

  .output-header h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }

  .output-actions { display: flex; gap: 8px; }

  .output-body {
    padding: 24px;
    min-height: 200px;
    max-height: 520px;
    overflow-y: auto;
  }

  .output-body p {
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .output-body p.placeholder {
    color: var(--text-dim);
    font-family: var(--font);
    font-style: italic;
    user-select: none;
  }

  .output-body::-webkit-scrollbar { width: 6px; }
  .output-body::-webkit-scrollbar-track { background: transparent; }
  .output-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 22px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .container { padding: 24px 16px 60px; }
    .controls { flex-direction: column; align-items: stretch; }
    .field select,
    .field input { width: 100%; min-width: 0; }
    .btn { justify-content: center; }
    .output-header { flex-direction: column; gap: 12px; align-items: stretch; }
    .output-actions { justify-content: stretch; }
    .output-actions .btn { flex: 1; justify-content: center; }
  }
</style>
</head>

<header>

    <div class="field">

      Сгенерировать
    </button>
  </div>

  <div class="output-section">
    <div class="output-header">
      <h3>Результат</h3>
      <div class="output-actions">
        <button class="btn btn-secondary" id="copyBtn">

            <path d="M11 4.5V2.5C11 1.67 10.33 1 9.5 1H2.5C1.67 1 1 1.67 1 2.5V9.5C1 10.33 1.67 11 2.5 11H4.5" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          Копировать

      </div>
    </div>
    <div class="output-body" id="output">

    </div>
  </div>
</div>

  const unitSelect = document.getElementById('unit');
  const countInput = document.getElementById('count');
  const generateBtn = document.getElementById('generateBtn');
  const copyBtn = document.getElementById('copyBtn');
  const output = document.getElementById('output');
  const toast = document.getElementById('toast');

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function capitalize(word) {
    return word.charAt(0).toUpperCase() + word.slice(1);
  }

  function generateWords(n) {
    const result = [];
    for (let i = 0; i < n; i++) {
      result.push(pick(WORDS));
    }
    return result.join(' ');
  }

  function generateSentence() {
    const len = 5 + Math.floor(Math.random() * 8);
    const words = [];
    for (let i = 0; i < len; i++) {
      words.push(pick(WORDS));
    }
    return capitalize(words.join(' ')) + '.';
  }

  function generateSentences(n) {
    const result = [];
    for (let i = 0; i < n; i++) {
      result.push(generateSentence());
    }
    return result.join(' ');
  }

  function generateParagraph() {
    const sentenceCount = 3 + Math.floor(Math.random() * 4);
    const sentences = [];
    for (let i = 0; i < sentenceCount; i++) {
      sentences.push(generateSentence());
    }
    return sentences.join(' ');
  }

  function generateParagraphs(n) {
    const result = [];
    for (let i = 0; i < n; i++) {
      result.push(generateParagraph());
    }
    return result.join('\n\n');
  }

  function generate() {
    const unit = unitSelect.value;
    let count = parseInt(countInput.value, 10);
    if (isNaN(count) || count < 1) count = 1;
    if (count > 100) count = 100;
    countInput.value = count;

    let text = '';
    switch (unit) {
      case 'words':
        text = generateWords(count);
        break;
      case 'sentences':
        text = generateSentences(count);
        break;
      case 'paragraphs':
        text = generateParagraphs(count);
        break;
    }

    output.innerHTML = `<p>${text}</p>`;
  }

  function copyText() {
    const p = output.querySelector('p');
    if (!p || p.classList.contains('placeholder')) {
      showToast('Нет текста для копирования');
      return;
    }
    navigator.clipboard.writeText(p.textContent).then(() => {
      showToast('Скопировано в буфер обмена');
    }).catch(() => {
      showToast('Не удалось скопировать');
    });
  }

  let toastTimeout;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toast.classList.remove('show');
    }, 2200);
  }

  generateBtn.addEventListener('click', generate);
  copyBtn.addEventListener('click', copyText);

  generate();
})();
