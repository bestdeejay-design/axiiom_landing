<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей — AXIIOM Tools</title>
    <link rel="icon" type="image/svg+xml" href="/images/axiiom3230-3932-4834-b432-373532376430__fav.svg">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="noise"></div>
<div class="grid-overlay"></div>

<header class="header" id="header">
    <div class="container">
        <nav class="nav">
            <a href="/" class="logo">
                <svg width="30" height="30" viewBox="0 0 36 36" fill="none">
                    <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
                    <rect x="20" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
                    <rect x="2" y="20" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
                    <rect x="20" y="20" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="27" cy="27" r="3" fill="currentColor" opacity=".8"/>
                </svg>
                <span>AXIIOM</span>
            </a>
            <ul class="nav-links nav-links--desktop tools-nav-links" id="toolsNav"></ul>
            <div class="nav-actions">
                <button class="theme-btn" id="themeToggle" aria-label="Сменить тему">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
                <button class="nav-toggle tools-nav-toggle" id="navToggle" aria-label="Меню">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </div>
</header>

<div class="nav-overlay" id="navOverlay">
    <ul class="nav-links" id="toolsNavMobile"></ul>
</div>

<aside class="tools-sidebar" id="toolsSidebar"></aside>
<div class="tools-pills" id="toolsPills"></div>

<div class="tool-page">
    <div class="container">
        <div class="tool-page-header">
            <a href="../" class="back-link">← Все инструменты</a>
            <h1>Генератор паролей</h1>
        </div>

        <div class="tool-page-card">
            <p class="tool-description">Создание надёжных паролей с настраиваемой длиной и набором символов.</p>

            <div class="tool-row">
                <div class="tool-output password-display" id="passwordDisplay">…………</div>
            </div>

            <div class="tool-btn-group">
                <button class="tool-btn" id="generateBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    Сгенерировать
                </button>
                <button class="tool-btn-secondary copy-btn" id="copyBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    Копировать
                </button>
            </div>

            <div class="tool-row">
                <div class="strength-bar" id="strengthBar">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:4px;">
                    <span style="font-size:.72rem;color:var(--clr-faint)">Надёжность: <strong id="strengthText">—</strong></span>
                </div>
            </div>

            <div class="tool-row">
                <label class="tool-label" for="lengthSlider">Длина пароля: <strong id="lengthDisplay">16</strong></label>
                <input type="range" class="tool-range" id="lengthSlider" min="4" max="64" value="16">
            </div>

            <div class="tool-row">
                <label class="tool-label">Набор символов</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="chkUpper" checked>
                        Заглавные (A-Z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chkLower" checked>
                        Строчные (a-z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chkDigits" checked>
                        Цифры (0-9)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chkSpecial">
                        Спецсимволы (!@#$%^&amp;*)
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p class="copy"><a href="https://axiiom.ru/" class="footer-link">AXIIOM</a> © 2026 — Бесплатные онлайн-инструменты</p>
    </div>
</footer>

<script src="../nav.js"></script>
<script>
initToolsNav('password-gen/');

var themeToggle = document.getElementById('themeToggle');
var html = document.documentElement;
var saved = localStorage.getItem('theme');
if (saved) html.setAttribute('data-theme', saved);
if (!saved && window.matchMedia('(prefers-color-scheme: light)').matches) {
    html.setAttribute('data-theme', 'light');
}
updateIcon();
themeToggle.addEventListener('click', function() {
    var current = html.getAttribute('data-theme');
    var next = current === 'light' ? '' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateIcon();
});
function updateIcon() {
    var isLight = html.getAttribute('data-theme') === 'light';
    themeToggle.innerHTML = isLight
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
}

var header = document.getElementById('header');
window.addEventListener('scroll', function() {
    header.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

var UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
var LOWER = 'abcdefghijklmnopqrstuvwxyz';
var DIGITS = '0123456789';
var SPECIAL = '!@#$%^&*';

var passwordDisplay = document.getElementById('passwordDisplay');
var lengthSlider = document.getElementById('lengthSlider');
var lengthDisplay = document.getElementById('lengthDisplay');
var chkUpper = document.getElementById('chkUpper');
var chkLower = document.getElementById('chkLower');
var chkDigits = document.getElementById('chkDigits');
var chkSpecial = document.getElementById('chkSpecial');
var strengthText = document.getElementById('strengthText');
var strengthBar = document.getElementById('strengthBar');

function generatePassword() {
    var chars = '';
    if (chkUpper.checked) chars += UPPER;
    if (chkLower.checked) chars += LOWER;
    if (chkDigits.checked) chars += DIGITS;
    if (chkSpecial.checked) chars += SPECIAL;

    if (chars.length === 0) {
        passwordDisplay.textContent = '…………';
        updateStrength(0, 0);
        return;
    }

    var length = parseInt(lengthSlider.value, 10);

    var sets = [];
    if (chkUpper.checked) sets.push(UPPER);
    if (chkLower.checked) sets.push(LOWER);
    if (chkDigits.checked) sets.push(DIGITS);
    if (chkSpecial.checked) sets.push(SPECIAL);

    var password = '';
    for (var i = 0; i < sets.length; i++) {
        password += sets[i].charAt(Math.floor(Math.random() * sets[i].length));
    }
    for (var j = password.length; j < length; j++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    var arr = password.split('');
    for (var k = arr.length - 1; k > 0; k--) {
        var m = Math.floor(Math.random() * (k + 1));
        var tmp = arr[k];
        arr[k] = arr[m];
        arr[m] = tmp;
    }
    passwordDisplay.textContent = arr.join('');
    updateStrength(length, sets.length);
}

function updateStrength(length, variety) {
    var score = 0;
    if (length >= 12) score += 40;
    else if (length >= 8) score += 25;
    else score += 10;

    score += variety * 15;

    if (length >= 16 && variety >= 3) score = Math.min(score, 100);
    if (length >= 12 && variety >= 4) score = Math.min(score, 100);

    var pct = 0;
    var label = '—';
    var cssClass = '';

    if (variety === 0 || length === 0) {
        pct = 0;
        label = '—';
        cssClass = '';
    } else if (score < 40) {
        pct = 1;
        label = 'Слабый';
        cssClass = 'weak';
    } else if (score < 70) {
        pct = 2;
        label = 'Средний';
        cssClass = 'medium';
    } else {
        pct = 3;
        label = 'Надёжный';
        cssClass = 'strong';
    }

    var spans = strengthBar.querySelectorAll('span');
    for (var i = 0; i < spans.length; i++) {
        spans[i].className = '';
        if (i < pct) spans[i].classList.add('active', cssClass);
    }

    strengthText.textContent = label;
}

lengthSlider.addEventListener('input', function() {
    lengthDisplay.textContent = this.value;
    generatePassword();
});

chkUpper.addEventListener('change', generatePassword);
chkLower.addEventListener('change', generatePassword);
chkDigits.addEventListener('change', generatePassword);
chkSpecial.addEventListener('change', generatePassword);

document.getElementById('generateBtn').addEventListener('click', generatePassword);

document.getElementById('copyBtn').addEventListener('click', function() {
    var text = passwordDisplay.textContent;
    if (!text || text === '…………') return;
    var btn = this;
    navigator.clipboard.writeText(text).then(function() {
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1800);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1800);
    });
});

generatePassword();
</script>
</body>
</html>
